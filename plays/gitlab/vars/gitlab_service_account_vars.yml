---
gitlab_url: https://gitlab.example.com

# Service accounts in GitLab 17.10 are created against a TOP-LEVEL group.
gitlab_top_level_group: engineering

gitlab_service_account_username: svc_gitlab_secondary_mirror
gitlab_service_account_name: Secondary GitLab mirror

# The service account is created with no memberships. Add only what it needs.
gitlab_service_account_memberships:
  - type: group
    path: engineering/platform
    access_level: 20

# PAT owned by the service account, not by the human running the playbook.
gitlab_token_name: secondary-gitlab-mirror
gitlab_token_description: Read access for secondary GitLab mirror
gitlab_token_scopes:
  - read_repository

# Empty requests no explicit expiry. On GitLab 17.10, a genuinely non-expiring
# service-account PAT requires service_access_tokens_expiration_enforced=false.
gitlab_token_expires_at: ""

# Lifecycle controls
gitlab_service_account_state: present
gitlab_token_state: present
gitlab_rotate_token: false
gitlab_replace_token_on_drift: false
gitlab_create_token_if_unverifiable: false

gitlab_validate_certs: true
