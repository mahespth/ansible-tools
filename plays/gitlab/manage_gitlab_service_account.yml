#!/usr/bin/env ansible-playbook
---
# code: language=ansible

# Manage gitlab service accounts, Steve Maher.
# -------------------------------------------------------------------------

- name: Manage GitLab service account and personal access token
  hosts: localhost
  gather_facts: false

  vars:
    # -------------------------------------------------------------------------
    # Caller authentication
    # -------------------------------------------------------------------------
    # The human caller token is used only to provision/manage the service
    # account. It does not own the resulting integration token.
    gitlab_caller_token: "{{ lookup('ansible.builtin.env', 'GITLAB_TOKEN') }}"

    # Optional existing service-account PAT. Supplying this lets a non-admin
    # top-level group Owner validate the existing token on later runs.
    gitlab_existing_service_token: >-
      {{ lookup('ansible.builtin.env', 'GITLAB_SERVICE_TOKEN') }}

    gitlab_validate_certs: true

    # -------------------------------------------------------------------------
    # Service account
    # -------------------------------------------------------------------------
    # Required:
    #   gitlab_url
    #   gitlab_top_level_group
    #   gitlab_service_account_username
    #   gitlab_token_name
    gitlab_service_account_name: "GitLab integration service account"
    gitlab_service_account_email: ""
    gitlab_service_account_state: present

    # Service accounts are not members of any group/project when created.
    # Manage the required access explicitly here.
    gitlab_service_account_memberships: []
    # Example:
    # gitlab_service_account_memberships:
    #   - type: group
    #     path: engineering/platform
    #     access_level: 20
    #   - type: project
    #     path: engineering/platform/repository
    #     access_level: 30

    # -------------------------------------------------------------------------
    # Service-account PAT
    # -------------------------------------------------------------------------
    gitlab_token_state: present
    gitlab_token_description: "Managed by Ansible"
    gitlab_token_scopes:
      - read_repository

    # Empty means omit expires_at from the API request. On GitLab 17.10 this
    # creates a non-expiring service-account PAT only when the instance setting
    # service_access_tokens_expiration_enforced is disabled. Otherwise GitLab
    # applies its configured/default lifetime.
    gitlab_token_expires_at: ""

    # Replacement is explicit because the old token becomes unusable once
    # revoked and the consumer must receive the new token.
    gitlab_rotate_token: false
    gitlab_replace_token_on_drift: false

    # GitLab 17.10 does not provide a group-Owner API to list PATs belonging to
    # a service account. An administrator can list them; a non-admin Owner must
    # supply the existing service PAT, retain the state files below, or explicitly
    # allow creation when the current token cannot be verified.
    gitlab_create_token_if_unverifiable: false

    # -------------------------------------------------------------------------
    # Local secret/state output
    # -------------------------------------------------------------------------
    gitlab_token_output_dir: >-
      {{ lookup('ansible.builtin.env', 'HOME') }}/.gitlab-service-accounts
    gitlab_token_file: >-
      {{ gitlab_token_output_dir }}/{{ gitlab_service_account_username | regex_replace('[^A-Za-z0-9_.-]', '_') }}.token
    gitlab_token_state_file: >-
      {{ gitlab_token_output_dir }}/{{ gitlab_service_account_username | regex_replace('[^A-Za-z0-9_.-]', '_') }}.json

  tasks:
    - name: Validate requested configuration
      ansible.builtin.assert:
        that:
          - gitlab_url | default('') | length > 0
          - gitlab_top_level_group | default('') | string | length > 0
          - gitlab_service_account_username | default('') | length > 0
          - gitlab_token_name | default('') | length > 0
          - gitlab_caller_token | default('') | length > 0
          - gitlab_service_account_state in ['present', 'absent']
          - gitlab_token_state in ['present', 'absent']
          - gitlab_token_scopes | length > 0
          - >-
            gitlab_service_account_memberships
            | selectattr('type', 'undefined')
            | list
            | length == 0
          - >-
            gitlab_service_account_memberships
            | selectattr('path', 'undefined')
            | list
            | length == 0
          - >-
            gitlab_service_account_memberships
            | selectattr('access_level', 'undefined')
            | list
            | length == 0
          - >-
            gitlab_service_account_memberships
            | map(attribute='type')
            | list
            | difference(['group', 'project'])
            | length == 0
          - >-
            gitlab_service_account_memberships
            | map(attribute='access_level')
            | map('int')
            | list
            | difference([5, 10, 15, 20, 30, 40, 50])
            | length == 0
        fail_msg: >-
          Supply gitlab_url, gitlab_top_level_group,
          gitlab_service_account_username, gitlab_token_name, and GITLAB_TOKEN.
          Membership type must be group/project and access_level must be a valid
          GitLab member access level.

    - name: Build GitLab API values
      ansible.builtin.set_fact:
        _gitlab_api_url: "{{ gitlab_url | regex_replace('/+$', '') }}/api/v4"
        _gitlab_top_group_ref: >-
          {{ (gitlab_top_level_group | string | urlencode) | replace('/', '%2F') }}

    - name: Validate caller token
      ansible.builtin.uri:
        url: "{{ _gitlab_api_url }}/user"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      register: _gitlab_caller
      no_log: true

    - name: Resolve top-level group
      ansible.builtin.uri:
        url: "{{ _gitlab_api_url }}/groups/{{ _gitlab_top_group_ref }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      register: _gitlab_top_group
      no_log: true

    - name: Ensure service account is associated with a top-level group
      ansible.builtin.assert:
        that:
          - _gitlab_top_group.json.parent_id is none
        fail_msg: >-
          '{{ gitlab_top_level_group }}' is a subgroup. GitLab 17.10 service
          account creation only works against a top-level group.

    - name: List service accounts for the top-level group
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/users/{{ _gitlab_top_group.json.id }}/service_accounts?per_page=100&order_by=username&sort=asc
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      register: _gitlab_service_accounts
      no_log: true

    - name: Refuse an incomplete service-account search
      ansible.builtin.assert:
        that:
          - _gitlab_service_accounts.x_next_page | default('') | length == 0
        fail_msg: >-
          The top-level group has more than 100 service accounts. This playbook
          deliberately refuses to create an account from a partial result set.

    - name: Select exact service-account username
      ansible.builtin.set_fact:
        _gitlab_service_account_matches: >-
          {{ _gitlab_service_accounts.json
            | selectattr('username', 'defined')
            | selectattr('username', 'equalto', gitlab_service_account_username)
            | list }}

    - name: Refuse duplicate service-account matches
      ansible.builtin.assert:
        that:
          - _gitlab_service_account_matches | length <= 1
        fail_msg: >-
          More than one service account matched username
          '{{ gitlab_service_account_username }}'.

    - name: Record existing service account
      ansible.builtin.set_fact:
        _gitlab_existing_service_account: >-
          {{ _gitlab_service_account_matches[0]
             if (_gitlab_service_account_matches | length == 1)
             else {} }}

    - name: Delete service account when state is absent
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/groups/{{ _gitlab_top_group.json.id }}/service_accounts/{{ _gitlab_existing_service_account.id }}
        method: DELETE
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 204
      when:
        - gitlab_service_account_state == 'absent'
        - _gitlab_existing_service_account | length > 0
      register: _gitlab_deleted_service_account
      no_log: true

    - name: Remove local token files for an absent service account
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ gitlab_token_file }}"
        - "{{ gitlab_token_state_file }}"
      when: gitlab_service_account_state == 'absent'

    - name: Stop after ensuring service account is absent
      ansible.builtin.meta: end_play
      when: gitlab_service_account_state == 'absent'

    - name: Create service account
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/groups/{{ _gitlab_top_group.json.id }}/service_accounts
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        body_format: json
        body: >-
          {{
            {
              'name': gitlab_service_account_name,
              'username': gitlab_service_account_username
            }
            | combine(
                {'email': gitlab_service_account_email}
                if (gitlab_service_account_email | length > 0)
                else {}
              )
          }}
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 201
      when: _gitlab_existing_service_account | length == 0
      register: _gitlab_created_service_account
      no_log: true

    - name: Record managed service account
      ansible.builtin.set_fact:
        _gitlab_service_account: >-
          {{ _gitlab_created_service_account.json
             if (_gitlab_created_service_account.status | default(0) == 201)
             else _gitlab_existing_service_account }}
        _gitlab_service_account_created: >-
          {{ _gitlab_created_service_account.status | default(0) == 201 }}

    - name: Update service-account name when required
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/groups/{{ _gitlab_top_group.json.id }}/service_accounts/{{ _gitlab_service_account.id }}
        method: PATCH
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        body_format: json
        body:
          name: "{{ gitlab_service_account_name }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      when:
        - _gitlab_service_account.name != gitlab_service_account_name
      register: _gitlab_updated_service_account
      no_log: true

    - name: Use updated service-account details
      ansible.builtin.set_fact:
        _gitlab_service_account: "{{ _gitlab_updated_service_account.json }}"
      when: _gitlab_updated_service_account.status | default(0) == 200

    # -----------------------------------------------------------------------
    # Membership management
    # -----------------------------------------------------------------------
    - name: Resolve requested service-account memberships
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/{{ 'groups' if item.type == 'group' else 'projects' }}/{{ (item.path | string | urlencode) | replace('/', '%2F') }}
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      loop: "{{ gitlab_service_account_memberships }}"
      loop_control:
        label: "{{ item.type }}:{{ item.path }}"
      register: _gitlab_resolved_memberships
      no_log: true

    - name: Read current direct memberships
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/{{ 'groups' if item.item.type == 'group' else 'projects' }}/{{ item.json.id }}/members/{{ _gitlab_service_account.id }}
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code:
          - 200
          - 404
      loop: "{{ _gitlab_resolved_memberships.results | default([]) }}"
      loop_control:
        label: "{{ item.item.type }}:{{ item.item.path }}"
      register: _gitlab_current_memberships
      no_log: true

    - name: Add missing service-account memberships
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/{{ 'groups' if item.item.item.type == 'group' else 'projects' }}/{{ item.item.json.id }}/members
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        body_format: json
        body:
          user_id: "{{ _gitlab_service_account.id }}"
          access_level: "{{ item.item.item.access_level | int }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 201
      loop: "{{ _gitlab_current_memberships.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item.type }}:{{ item.item.item.path }}"
      when: item.status == 404
      no_log: true

    - name: Correct service-account membership roles
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/{{ 'groups' if item.item.item.type == 'group' else 'projects' }}/{{ item.item.json.id }}/members/{{ _gitlab_service_account.id }}
        method: PUT
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        body_format: json
        body:
          access_level: "{{ item.item.item.access_level | int }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 200
      loop: "{{ _gitlab_current_memberships.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item.type }}:{{ item.item.item.path }}"
      when:
        - item.status == 200
        - item.json.access_level | int != item.item.item.access_level | int
      no_log: true

    # -----------------------------------------------------------------------
    # Token discovery
    # -----------------------------------------------------------------------
    - name: Check for locally retained service token
      ansible.builtin.stat:
        path: "{{ gitlab_token_file }}"
      register: _gitlab_token_file_stat
      no_log: true

    - name: Read locally retained service token
      ansible.builtin.slurp:
        src: "{{ gitlab_token_file }}"
      when:
        - gitlab_existing_service_token | default('') | length == 0
        - _gitlab_token_file_stat.stat.exists
      register: _gitlab_local_token
      no_log: true

    - name: Select available existing service token
      ansible.builtin.set_fact:
        _gitlab_service_token_secret: >-
          {% if gitlab_existing_service_token | default('') | length > 0 %}
          {{ gitlab_existing_service_token }}
          {% elif _gitlab_local_token.content | default('') | length > 0 %}
          {{ _gitlab_local_token.content | b64decode | trim }}
          {% else %}
          {{ '' }}
          {% endif %}
      no_log: true

    - name: Check for locally retained token state
      ansible.builtin.stat:
        path: "{{ gitlab_token_state_file }}"
      register: _gitlab_token_state_file_stat

    - name: Read locally retained token state
      ansible.builtin.slurp:
        src: "{{ gitlab_token_state_file }}"
      when: _gitlab_token_state_file_stat.stat.exists
      register: _gitlab_local_token_state_raw
      no_log: true

    - name: Decode locally retained token state
      ansible.builtin.set_fact:
        _gitlab_local_token_state: >-
          {{ (_gitlab_local_token_state_raw.content | b64decode | from_json)
             if (_gitlab_local_token_state_raw.content | default('') | length > 0)
             else {} }}
      no_log: true

    - name: Ask GitLab for service-account PATs using caller credentials
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/personal_access_tokens?user_id={{ _gitlab_service_account.id }}&state=active&search={{ gitlab_token_name | urlencode }}&per_page=100
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code:
          - 200
          - 401
          - 403
      register: _gitlab_admin_token_list
      no_log: true

    - name: Validate available service token through self-inform API
      ansible.builtin.uri:
        url: "{{ _gitlab_api_url }}/personal_access_tokens/self"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ _gitlab_service_token_secret }}"
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code:
          - 200
          - 401
      when: _gitlab_service_token_secret | length > 0
      register: _gitlab_service_token_self
      no_log: true

    - name: Select exact token matches visible to an administrator
      ansible.builtin.set_fact:
        _gitlab_admin_token_matches: >-
          {{ (_gitlab_admin_token_list.json
              | selectattr('name', 'equalto', gitlab_token_name)
              | selectattr('user_id', 'equalto', _gitlab_service_account.id)
              | list)
             if (_gitlab_admin_token_list.status == 200)
             else [] }}
      no_log: true

    - name: Refuse duplicate active PATs with the managed name
      ansible.builtin.assert:
        that:
          - _gitlab_admin_token_matches | length <= 1
        fail_msg: >-
          More than one active PAT named '{{ gitlab_token_name }}' belongs to
          service account '{{ gitlab_service_account_username }}'. Resolve the
          duplicates before using this playbook.

    - name: Validate supplied service token belongs to the managed account and token
      ansible.builtin.assert:
        that:
          - _gitlab_service_token_self.json.user_id | int == _gitlab_service_account.id | int
          - _gitlab_service_token_self.json.name == gitlab_token_name
        fail_msg: >-
          GITLAB_SERVICE_TOKEN/local token file does not belong to PAT
          '{{ gitlab_token_name }}' on service account
          '{{ gitlab_service_account_username }}'.
      when:
        - _gitlab_service_token_self.status | default(0) == 200

    - name: Validate retained token state belongs to the managed account and token
      ansible.builtin.assert:
        that:
          - _gitlab_local_token_state.user_id | int == _gitlab_service_account.id | int
          - _gitlab_local_token_state.name == gitlab_token_name
        fail_msg: >-
          The local token state file belongs to a different service account or
          token. Remove '{{ gitlab_token_state_file }}' after verifying it is stale.
      when: _gitlab_local_token_state | length > 0

    - name: Select current token metadata
      ansible.builtin.set_fact:
        _gitlab_current_token: >-
          {% if _gitlab_admin_token_matches | length == 1 %}
          {{ _gitlab_admin_token_matches[0] }}
          {% elif _gitlab_service_token_self.status | default(0) == 200 %}
          {{ _gitlab_service_token_self.json }}
          {% elif _gitlab_local_token_state | length > 0 %}
          {{ _gitlab_local_token_state }}
          {% else %}
          {{ {} }}
          {% endif %}
        _gitlab_token_discovery_source: >-
          {% if _gitlab_admin_token_matches | length == 1 %}
          administrator API
          {% elif _gitlab_service_token_self.status | default(0) == 200 %}
          service token self-inform API
          {% elif _gitlab_local_token_state | length > 0 %}
          local state file
          {% else %}
          unavailable
          {% endif %}
      no_log: true

    - name: Calculate token configuration drift
      ansible.builtin.set_fact:
        _gitlab_token_drift: >-
          {{
            (_gitlab_current_token | length > 0)
            and
            (
              ((_gitlab_current_token.scopes | default([]) | sort)
               != (gitlab_token_scopes | sort))
              or
              ((_gitlab_current_token.description | default(''))
               != gitlab_token_description)
              or
              (
                (gitlab_token_expires_at | length > 0)
                and
                ((_gitlab_current_token.expires_at | default(''))
                 != gitlab_token_expires_at)
              )
            )
          }}

    - name: Refuse token drift unless replacement is explicitly enabled
      ansible.builtin.fail:
        msg: |
          Existing service-account PAT '{{ gitlab_token_name }}' differs from the requested state.

          Current scopes:      {{ _gitlab_current_token.scopes | default([]) }}
          Requested scopes:    {{ gitlab_token_scopes }}
          Current description: {{ _gitlab_current_token.description | default('') }}
          Requested description: {{ gitlab_token_description }}
          Current expiry:      {{ _gitlab_current_token.expires_at | default('none') }}
          Requested expiry:    {{ gitlab_token_expires_at | default('none', true) }}

          Set gitlab_replace_token_on_drift=true to create a replacement PAT and
          revoke the old PAT.
      when:
        - gitlab_token_state == 'present'
        - _gitlab_token_drift | bool
        - not gitlab_replace_token_on_drift | bool

    - name: Determine whether old token can be revoked safely
      ansible.builtin.set_fact:
        _gitlab_can_revoke_current_token: >-
          {{
            (_gitlab_admin_token_list.status == 200)
            or
            (
              _gitlab_service_token_self.status | default(0) == 200
              and
              _gitlab_service_token_self.json.id | int == _gitlab_current_token.id | int
            )
          }}
      when: _gitlab_current_token | length > 0
      no_log: true

    - name: Refuse replacement when the old PAT cannot be revoked
      ansible.builtin.fail:
        msg: >-
          The existing PAT is known only from local state and the caller is not
          permitted to list/revoke service-account PATs. Refusing to create a
          duplicate token. Supply the current service-account token in
          GITLAB_SERVICE_TOKEN or run with a GitLab administrator PAT.
      when:
        - gitlab_token_state == 'present'
        - _gitlab_current_token | length > 0
        - (gitlab_rotate_token | bool or _gitlab_token_drift | bool)
        - not _gitlab_can_revoke_current_token | default(false) | bool

    - name: Refuse unverifiable token creation for an existing service account
      ansible.builtin.fail:
        msg: >-
          Service account '{{ gitlab_service_account_username }}' already exists,
          but GitLab 17.10 does not let a non-admin group Owner list that service
          account's PATs. Refusing to create a duplicate PAT. Supply the current
          PAT in GITLAB_SERVICE_TOKEN, retain the local state files, use an admin
          caller PAT, or explicitly set gitlab_create_token_if_unverifiable=true.
      when:
        - gitlab_token_state == 'present'
        - not _gitlab_service_account_created | bool
        - _gitlab_current_token | length == 0
        - _gitlab_admin_token_list.status != 200
        - not gitlab_create_token_if_unverifiable | bool

    # -----------------------------------------------------------------------
    # Token create / replace / revoke
    # -----------------------------------------------------------------------
    - name: Create new or replacement service-account PAT
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/groups/{{ _gitlab_top_group.json.id }}/service_accounts/{{ _gitlab_service_account.id }}/personal_access_tokens
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        body_format: json
        body: >-
          {{
            {
              'name': gitlab_token_name,
              'description': gitlab_token_description,
              'scopes': gitlab_token_scopes
            }
            | combine(
                {'expires_at': gitlab_token_expires_at}
                if (gitlab_token_expires_at | length > 0)
                else {}
              )
          }}
        return_content: true
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 201
      when:
        - gitlab_token_state == 'present'
        - >-
          (_gitlab_current_token | length == 0)
          or
          (gitlab_rotate_token | bool)
          or
          (_gitlab_token_drift | bool and gitlab_replace_token_on_drift | bool)
      register: _gitlab_created_token
      no_log: true

    - name: Revoke replaced PAT as administrator
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/personal_access_tokens/{{ _gitlab_current_token.id }}
        method: DELETE
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 204
      when:
        - _gitlab_created_token.status | default(0) == 201
        - _gitlab_current_token | length > 0
        - _gitlab_admin_token_list.status == 200
      register: _gitlab_admin_revoked_old_token
      no_log: true

    - name: Self-revoke replaced PAT using old service-account token
      ansible.builtin.uri:
        url: "{{ _gitlab_api_url }}/personal_access_tokens/self"
        method: DELETE
        headers:
          PRIVATE-TOKEN: "{{ _gitlab_service_token_secret }}"
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 204
      when:
        - _gitlab_created_token.status | default(0) == 201
        - _gitlab_current_token | length > 0
        - _gitlab_admin_token_list.status != 200
        - _gitlab_service_token_self.status | default(0) == 200
      register: _gitlab_self_revoked_old_token
      no_log: true

    - name: Revoke current PAT when token state is absent as administrator
      ansible.builtin.uri:
        url: >-
          {{ _gitlab_api_url }}/personal_access_tokens/{{ _gitlab_current_token.id }}
        method: DELETE
        headers:
          PRIVATE-TOKEN: "{{ gitlab_caller_token }}"
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 204
      when:
        - gitlab_token_state == 'absent'
        - _gitlab_current_token | length > 0
        - _gitlab_admin_token_list.status == 200
      register: _gitlab_admin_revoked_token
      no_log: true

    - name: Self-revoke current PAT when token state is absent
      ansible.builtin.uri:
        url: "{{ _gitlab_api_url }}/personal_access_tokens/self"
        method: DELETE
        headers:
          PRIVATE-TOKEN: "{{ _gitlab_service_token_secret }}"
        validate_certs: "{{ gitlab_validate_certs }}"
        status_code: 204
      when:
        - gitlab_token_state == 'absent'
        - _gitlab_current_token | length > 0
        - _gitlab_admin_token_list.status != 200
        - _gitlab_service_token_self.status | default(0) == 200
      register: _gitlab_self_revoked_token
      no_log: true

    - name: Refuse token removal when the PAT cannot be revoked
      ansible.builtin.fail:
        msg: >-
          The PAT is known from local state but cannot be revoked by the caller.
          Supply GITLAB_SERVICE_TOKEN or use a GitLab administrator PAT.
      when:
        - gitlab_token_state == 'absent'
        - _gitlab_current_token | length > 0
        - _gitlab_admin_token_list.status != 200
        - _gitlab_service_token_self.status | default(0) != 200

    # -----------------------------------------------------------------------
    # Persist newly returned secret and token metadata
    # -----------------------------------------------------------------------
    - name: Create private token output directory
      ansible.builtin.file:
        path: "{{ gitlab_token_output_dir }}"
        state: directory
        mode: "0700"
      when: _gitlab_created_token.status | default(0) == 201

    - name: Save newly issued service-account token
      ansible.builtin.copy:
        dest: "{{ gitlab_token_file }}"
        content: "{{ _gitlab_created_token.json.token }}\n"
        mode: "0600"
      when: _gitlab_created_token.status | default(0) == 201
      no_log: true

    - name: Save newly issued token metadata
      ansible.builtin.copy:
        dest: "{{ gitlab_token_state_file }}"
        content: >-
          {{
            {
              'id': _gitlab_created_token.json.id,
              'name': _gitlab_created_token.json.name,
              'description': _gitlab_created_token.json.description | default(''),
              'user_id': _gitlab_created_token.json.user_id,
              'scopes': _gitlab_created_token.json.scopes,
              'expires_at': _gitlab_created_token.json.expires_at | default(none)
            }
            | to_nice_json
          }}
        mode: "0600"
      when: _gitlab_created_token.status | default(0) == 201
      no_log: true

    - name: Remove local token files when PAT state is absent
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ gitlab_token_file }}"
        - "{{ gitlab_token_state_file }}"
      when: gitlab_token_state == 'absent'

    - name: Determine service-account action
      ansible.builtin.set_fact:
        _gitlab_service_account_action: >-
          {{ 'created'
             if _gitlab_service_account_created | bool
             else
             ('updated'
              if _gitlab_updated_service_account.status | default(0) == 200
              else 'unchanged') }}
        _gitlab_token_action: >-
          {% if gitlab_token_state == 'absent' %}
          {{ 'revoked' if (_gitlab_admin_revoked_token.status | default(0) == 204 or _gitlab_self_revoked_token.status | default(0) == 204) else 'already absent' }}
          {% elif _gitlab_created_token.status | default(0) == 201 and _gitlab_current_token | length > 0 %}
          replaced
          {% elif _gitlab_created_token.status | default(0) == 201 %}
          created
          {% else %}
          unchanged
          {% endif %}

    - name: Report managed GitLab service account
      ansible.builtin.debug:
        msg:
          - "GitLab caller: {{ _gitlab_caller.json.username }}"
          - "Top-level group: {{ _gitlab_top_group.json.full_path }} (ID {{ _gitlab_top_group.json.id }})"
          - "Service account: {{ _gitlab_service_account.username }} (user ID {{ _gitlab_service_account.id }})"
          - "Service-account action: {{ _gitlab_service_account_action | trim }}"
          - "Token: {{ gitlab_token_name }}"
          - "Token discovery: {{ _gitlab_token_discovery_source | trim }}"
          - "Token action: {{ _gitlab_token_action | trim }}"
          - >-
            {{ 'New token saved to ' ~ gitlab_token_file
               if (_gitlab_created_token.status | default(0) == 201)
               else 'No new token secret was issued.' }}
          - >-
            {{ 'New token expires: ' ~ (_gitlab_created_token.json.expires_at | default('never', true) | string)
               if (_gitlab_created_token.status | default(0) == 201)
               else 'Existing token expiry was not changed.' }}
